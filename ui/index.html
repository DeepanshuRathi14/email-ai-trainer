<!DOCTYPE html>
<html>
<head>
    <title>Email AI Trainer</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            background: blue;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        textarea {
            width: 100%;
            height: 80px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>📧 Email AI Trainer</h2>

    <button onclick="getEmail()">Get Email</button>

    <p id="email"></p>

    <textarea id="response" placeholder="Write your reply..."></textarea>

    <br>

    <button onclick="submitResponse()">Submit</button>

    <h3 id="score"></h3>
    <p id="feedback"></p>
</div>

<script>
    async function getEmail() {
        let res = await fetch("http://127.0.0.1:8000/reset", {
            method: "POST"
        });

        let data = await res.json();
        document.getElementById("email").innerText = data.email;
    }

    async function submitResponse() {
        let response = document.getElementById("response").value;

        let res = await fetch("http://127.0.0.1:8000/step", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({response})
        });

        let data = await res.json();

        document.getElementById("score").innerText = "Score: " + data.score;
        document.getElementById("feedback").innerText = data.feedback;
    }
</script>

</body>
</html>
